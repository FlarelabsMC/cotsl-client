    from rootProject.file('LICENSE')
    from(configurations.embed) {
        into 'META-INF/extjarjar'
    }
    from(configurations["embedNative_${currentPlatform.replace('-', '_')}"]) {
        into 'META-INF/extjarjar'
    }
    manifest {
        attributes 'Premain-Class': 'com.flarelabsmc.cotsl.launch.LaunchAgent'
    }
}

allPlatforms.each { platform ->
    def safe = platform.replace('-', '_')
    tasks.register("jar_${safe}", Jar) {
        group = 'build'
        description = "Assembles mod JAR for ${platform}"
        archiveClassifier = platform
        from sourceSets.main.output
        from rootProject.file('LICENSE')
        from(tasks.named('jarJar'))
        from(configurations.embed) { into 'META-INF/extjarjar' }
        from(configurations["embedNative_${safe}"]) { into 'META-INF/extjarjar' }
        manifest {
            attributes 'Premain-Class': 'com.flarelabsmc.cotsl.launch.LaunchAgent'
        }
    }
}

